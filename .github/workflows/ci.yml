name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: oneshot
          POSTGRES_PASSWORD: oneshot
          POSTGRES_DB: oneshot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://oneshot:oneshot@localhost:5432/oneshot_test
      REDIS_URL: redis://localhost:6379
      FSP_MODE: mock
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version read from packageManager field in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @oneshot/persistence db:generate

      - name: Run migrations
        run: pnpm --filter @oneshot/persistence exec prisma migrate deploy

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  docs-integrity:
    name: Docs integrity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required doc files exist
        run: |
          for f in docs/requirements.md docs/scope.md docs/phases.md docs/architecture.md \
                   docs/decisions.md docs/system-map.md docs/constraints.md docs/evaluation.md; do
            [ -f "$f" ] || (echo "Missing required doc: $f" && exit 1)
          done
          echo "All required docs present."
