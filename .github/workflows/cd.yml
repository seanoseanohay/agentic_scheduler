name: CD

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'pilot'
        type: choice
        options: [pilot, staging, prod]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false  # never cancel an in-flight deployment

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ── Build & push Docker images ─────────────────────────────────────────────
  build:
    name: Build images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [api, workers, web]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version read from packageManager field in package.json

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/oneshot-${{ matrix.app }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/oneshot-${{ matrix.app }}:latest
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  # ── Deploy infrastructure + apps ───────────────────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.event.inputs.environment || 'pilot' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Register required Azure providers
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az provider register --namespace Microsoft.App --wait
            az provider register --namespace Microsoft.OperationalInsights --wait
            az provider register --namespace Microsoft.ContainerRegistry --wait
            az provider register --namespace Microsoft.DBforPostgreSQL --wait
            az provider register --namespace Microsoft.Cache --wait
            az provider register --namespace Microsoft.KeyVault --wait

      - name: Deploy Bicep infrastructure
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: rg-oneshot-${{ github.event.inputs.environment || 'pilot' }}
          template: infra/main.bicep
          parameters: >
            environmentName=${{ github.event.inputs.environment || 'pilot' }}
            location=centralus
            postgresAdminPassword=${{ secrets.POSTGRES_ADMIN_PASSWORD }}
            jwtSecret=${{ secrets.JWT_SECRET }}
            nextauthSecret=${{ secrets.NEXTAUTH_SECRET }}
            azureAdClientId=${{ secrets.AZURE_AD_CLIENT_ID }}
            azureAdClientSecret=${{ secrets.AZURE_AD_CLIENT_SECRET }}
            azureAdTenantId=${{ secrets.AZURE_AD_TENANT_ID }}
            fspApiKey=${{ secrets.FSP_API_KEY }}
            acsConnectionString=${{ secrets.ACS_CONNECTION_STRING }}
            imageTag=${{ env.IMAGE_TAG }}
          failOnStdErr: false

      - name: Run DB migrations
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: rg-oneshot-${{ github.event.inputs.environment || 'pilot' }}
          containerAppName: oneshot-api
          # One-shot migration job runs prisma migrate deploy on startup via the API entrypoint
          # (handled by apps/api/src/index.ts → prisma.$executeRaw on first connection)

      - name: Smoke test
        run: |
          API_URL=$(az containerapp show \
            --name oneshot-api \
            --resource-group rg-oneshot-${{ github.event.inputs.environment || 'pilot' }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          curl -sf "https://${API_URL}/health" | grep '"status":"ok"'
          echo "✅ Health check passed — https://${API_URL}"
